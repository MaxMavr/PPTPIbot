commands:
  start: | 
    Присылай сюда свои строчки — я их аккуратно оформлю и отправлю тебе обратно
    
    Как отправить строки? /help
    Кто сделал бота? /about

  help: |
    <b>Как предложить пост</b>
    
    Кидай сюда текст, ссылку на трек или всё сразу — порядок не имеет значения, главное писать с новой строки.

    Можно прислать:
    1. Только текст песни
    2. Текст
        <a href="https://music.yandex.ru/">Ссылка на Яндекс Музыку</a>
    3. Текст
        Артист<span class="tg-spoiler"> </span>:<span class="tg-spoiler"> </span>Песня    <i>обрати внимание на пробелы!!</i>
        <a href="https://www.youtube.com/">Ссылка на трек</a>

    Ссылки подойдут на любую музыку, но если дашь ссылку с Яндекс Музыки — я сам вытащу название и исполнителя.

    Вот парочка примеров:

  about: |
    Продакшн <b><a href="https://t.me/phasalo">Phasalo</a></b>
    Дизайн <b><a href="https://t.me/kfprod">KFproduction</a></b>
    
    <i>Информационные ресурсы
    взяты с Яндекс Музыки</i>

    2025, 18+

  playlist: |
    <b>Плейлисты канала</b>
    
    Они дублируют ссылки из постов
    <a href="https://music.yandex.ru/users/mavriashin/playlists/1008">Яндекс Музыка</a> — @maxmavr
    <a href="https://vk.com/audio?z=audio_playlist400964656_17/c6b8b4a4dbfec4c585">Вконтакте</a> — @SD5th
    <a href="https://www.youtube.com/playlist?list=PL8Sr4lcWrn6ZfM8gOP3QGstjKxqbBGewX">YouTube</a> — @quia_absurdum
    <a href="https://open.spotify.com/playlist/1No9ZTSziYcZvlmGM4GlRR?si=B91fQZirQoK6sgh7VieJ0w&pi=Oe7vWeQXSp2wR">Spotify</a> — @otenny
    
    Если чего-то нет, докапывайтесь до ответственных, если хотите ещё где-то составить, пишите <a href="https://t.me/maxmavr">Максиму</a>

help_examples:
    exemple1: |
      Мои песни – это тест: если тебя не прёт то , что я пою
      Значит, у тебя просто    недостаточно высокий IQ
    exemple2: |
      Скинул ей двух котиков, она сказала: "Это мы"
      https://music.yandex.ru/album/27532032/track/117726873?utm_source=desktop&utm_medium=c
    exemple3: |
      Бесконечный бэд трип, в черепе чик-чик
      Безысходность блицкриг, эта ноша близ книг
      Если хочешь, блесни, бисом бризом дрисни
      Это тупо басни, а жизнь дешевле песни
      The Вепри : Синдром Кассандры
      https://vk.com/audio329073734_456240403_deba7373b421904343


